name: Build and deploy Node.js app to Azure Web App - BoostWorks

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: BoostWorks
  NODE_VERSION: 22.x

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm test --if-present

      - name: Prepare deployment package
        run: |
          mkdir -p "$RUNNER_TEMP/deploy"
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            ./ "$RUNNER_TEMP/deploy/"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ${{ runner.temp }}/deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: release
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B15FC6E394A54538AC004BC27B08CD1F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9A21B978D4A1405AB320A8BECED3237B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AA72DA93866744219B64AAD14C4BFE8C }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: release
          
